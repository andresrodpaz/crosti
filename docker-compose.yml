# =================================================================
# CROSTI APP - DOCKER COMPOSE CONFIGURATION
# =================================================================
# This file defines the Docker services for the Crosti App
#
# Usage:
#   Development: docker-compose up --build
#   Production:  docker-compose -f docker-compose.yml up -d
#   Stop:        docker-compose down
#   Logs:        docker-compose logs -f
# =================================================================

version: "3.8"

services:
  # -----------------------------------------------------------------
  # NEXT.JS APPLICATION
  # -----------------------------------------------------------------
  crosti-app:
    container_name: crosti-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      # Supabase Configuration
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}

      # Supabase Database
      - SUPABASE_POSTGRES_URL=${SUPABASE_POSTGRES_URL}
      - SUPABASE_POSTGRES_PRISMA_URL=${SUPABASE_POSTGRES_PRISMA_URL}
      - SUPABASE_POSTGRES_URL_NON_POOLING=${SUPABASE_POSTGRES_URL_NON_POOLING}
      - SUPABASE_POSTGRES_HOST=${SUPABASE_POSTGRES_HOST}
      - SUPABASE_POSTGRES_USER=${SUPABASE_POSTGRES_USER}
      - SUPABASE_POSTGRES_PASSWORD=${SUPABASE_POSTGRES_PASSWORD}
      - SUPABASE_POSTGRES_DATABASE=${SUPABASE_POSTGRES_DATABASE}

      # Neon Database (if using Neon instead of Supabase DB)
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_UNPOOLED=${DATABASE_URL_UNPOOLED}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_URL_NON_POOLING=${POSTGRES_URL_NON_POOLING}
      - POSTGRES_PRISMA_URL=${POSTGRES_PRISMA_URL}
      - NEON_PROJECT_ID=${NEON_PROJECT_ID}

      # Application Configuration
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - PORT=3000
      - HOSTNAME=0.0.0.0

    restart: unless-stopped
    networks:
      - crosti-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

# -----------------------------------------------------------------
# NETWORKS
# -----------------------------------------------------------------
networks:
  crosti-network:
    driver: bridge
    name: crosti-network

# -----------------------------------------------------------------
# VOLUMES (Optional - for persistent data if needed)
# -----------------------------------------------------------------
# volumes:
#   crosti-data:
#     driver: local

# =================================================================
# DEVELOPER NOTES
# =================================================================
#
# Quick Start:
#   1. Copy .env.example to .env.local and fill in values
#   2. Run: docker-compose up --build
#   3. Access: http://localhost:3000
#
# Production Deployment:
#   1. Set all environment variables in .env or CI/CD
#   2. Build: docker-compose build
#   3. Run: docker-compose up -d
#   4. Monitor: docker-compose logs -f
#
# Useful Commands:
#   - View logs: docker-compose logs -f crosti-app
#   - Restart: docker-compose restart crosti-app
#   - Stop: docker-compose down
#   - Clean rebuild: docker-compose down && docker-compose build --no-cache && docker-compose up -d
#
# Health Check:
#   The app includes a health check endpoint at /api/health
#   Docker will automatically restart if health checks fail
#
# =================================================================
